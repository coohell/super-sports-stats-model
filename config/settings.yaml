# 스포츠 분석 설정
app:
  name: "Super Sports Stats Model"
  version: "1.0.0"

# 수집 설정
collection:
  # 뉴스
  news:
    sources:
      - name: "naver_sports"
        url: "https://sports.news.naver.com/"
        enabled: true
      - name: "google_news"
        query_template: "{home_team} vs {away_team} match preview"
        enabled: true
    max_articles: 10
    
  # 배당률
  odds:
    sources:
      - name: "flashscore"
        enabled: true
      - name: "oddsportal"
        enabled: false  # 필요시 활성화
    markets:
      - "1x2"        # 승무패
      - "ah"         # 아시안 핸디캡
      - "ou"         # 언더오버
      - "bts"        # both teams to score
    
  # 경기 데이터
  match:
    api:
      provider: "api-football"
      base_url: "https://v3.football.api-sports.io"
      # API 키는 .env 파일에서 관리
    history_matches: 10  # 최근 N경기 평균 사용

# 분석 설정
analysis:
  simulation:
    runs: 1000           # 몬테카를로 반복 횟수
    confidence_level: 0.95
    
  strategies:
    conservative:
      name: "신중"
      min_probability: 0.60
      max_odds: 2.0
      description: "가장 안전하고 확률이 높은 선택만"
      
    balanced:
      name: "적정"
      min_probability: 0.45
      max_odds: 3.5
      description: "밸런스 있게 배팅"
      
    aggressive:
      name: "공격"
      min_probability: 0.30
      max_odds: 10.0
      description: "큰 수익으로 한 방을 노림"

  # 몰빵 방지
  risk_management:
    max_bets_per_match: 1      # 한 경기당 최대 1개 픽
    diversification: true       # 분산 투자
    kelly_fraction: 0.25       # Kelly criterion fractional (보수적)

# LLM 설정
llm:
  provider: "anthropic"  # 또는 "openai"
  model: "claude-3-sonnet-20240229"
  temperature: 0.3
  max_tokens: 2000

# 예측 모델
model:
  type: "ensemble"  # ensemble | xgboost | random_forest
  features:
    - "goal_difference"
    - "shot_difference"
    - "possession_difference"
    - "pass_accuracy_difference"
    - "corner_difference"
    - "form_index"
    - "home_advantage"
    - "h2h_win_rate"
    - "odds_implied_prob"
  
# 출력 설정
output:
  formats:
    - "console"
    - "json"
    - "csv"
  save_predictions: true
  log_level: "INFO"
